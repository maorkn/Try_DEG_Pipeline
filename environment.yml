name: deg-pipeline
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.11,<3.13
  - pip
  # Core scientific Python
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - statsmodels>=0.14.0
  - scikit-learn>=1.3.0
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  # Configuration and validation
  - pyyaml>=6.0
  - pydantic>=2.0.0
  # Template engine for reports
  - jinja2>=3.1.0
  # Markdown to HTML conversion
  - markdown>=3.4.0
  # Testing
  - pytest>=7.0.0
  - pytest-cov>=4.0.0
  # Pip-only packages
  - pip:
    - pydeseq2>=0.4.0
    - goatools>=1.3.0